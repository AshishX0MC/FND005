<!DOCTYPE html>

<html>

    <head>

        <style>
            
            .subscribe-button{
                background-color: #CC0000;
                color: white;
                border-radius: 2px;
                border-style: none;
                padding-top: 9px;
                padding-right: 15px;
                padding-bottom: 9px;
                padding-left: 15px;
                font-family: 'Courier New', Courier, monospace;
                display: block;
                margin-bottom: 15px;
                size: 30px;
                width: 150px;
            }

            .join-button{
                background-color: white;
                color: #2c62d5;
                border-color: #2c62d5;
                border-radius: 1px;
                border-width: 0.5px;
                border-style: solid;
                padding-top: 9px;
                padding-right: 15px;
                padding-bottom: 9px;
                padding-left: 15px;
                display: block;
            }

            .tweet-button{
                background-color: blue;
                color: white;
                border-radius: 50px;
                border-style: none;
                padding-top: 9px;
                padding-right: 15px;
                padding-bottom: 9px;
                padding-left: 15px;
            }

            .view-film-program-button{
                background-color: orange;
                color: white;
                border-radius: 6px;
            }

            .enquire-button{
                background-color: black;
                color: white;
                border-color: orange;
                border-radius: 2px;
                border-style: solid;
            }

            img{
                width: 600px;
                display: block;
            }

        </style>
    </head>

    <body>

        <button class="subscribe-button"><img src="image1.JPG">SUBSCRIBE</button>
        <button class="join-button">JOIN</button>
        <button class="tweet-button">Tweet</button>
        <button class="view-film-program-button">View Film Program</button>
        <button class="enquire-button">Enquire now</button>
        <button class="compose-button">✏️ Compose</button>
        <button class="create-account-button">Create account ></button>
        <button class="sign-in-button">Sign in now</button>

        <a href="https://www.w3schools.com/html/html_images.asp">This is a link</a>

        <a href="https://www.w3schools.com/html/html_images.asp"><img src="image1.JPG"></a>
        <a href="https://www.w3schools.com/html/html_images.asp"><img src="image1.JPG"><button>Hello</button></a>
    </body>

</html>
