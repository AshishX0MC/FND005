<!DOCTYPE html>

<html>

    <head>

        <style>
            
            .subscribe-button{
                background-color: #CC0000;
                color: white;
                border-radius: 2px;
                border-style: none;
                padding-top: 9px;
                padding-right: 15px;
                padding-bottom: 9px;
                padding-left: 15px;
            }

            .join-button{
                background-color: white;
                color: #2c62d5;
                border-color: #2c62d5;
                border-radius: 1px;
                border-width: 0.5px;
                border-style: solid;
                padding-top: 9px;
                padding-right: 15px;
                padding-bottom: 9px;
                padding-left: 15px;
            }

            .tweet-button{
                background-color: blue;
                color: white;
                border-radius: 50px;
                border-style: none;
                padding-top: 9px;
                padding-right: 15px;
                padding-bottom: 9px;
                padding-left: 15px;
            }

        </style>
    </head>

    <body>

        <button class="subscribe-button">SUBSCRIBE</button>
        <button class="join-button">JOIN</button>
        <button class="tweet-button">Tweet</button>
    
    </body>

</html>
